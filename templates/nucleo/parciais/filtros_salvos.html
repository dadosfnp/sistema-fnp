{% comment %}
Dropdown de filtros salvos, reutilizavel em qualquer lista.

Variáveis obrigatórias:
    escopo_url    - nome da URL da lista, ex. "cadastro:lista_municipios"
{% endcomment %}
<div x-data="filtrosSalvos('{{ escopo_url }}')" x-init="carregar()" class="relative inline-block">
    <button type="button" @click="aberto = !aberto"
            class="inline-flex items-center gap-1.5 px-3 py-2 text-sm font-medium text-gray-600 bg-gray-50 rounded-lg hover:bg-gray-100 border border-gray-200 transition-colors">
        <i data-lucide="bookmark" class="w-3.5 h-3.5"></i>
        <span>Visões</span>
        <span x-show="filtros.length > 0" class="text-[10px] font-semibold text-fnp-600" x-text="filtros.length"></span>
        <i data-lucide="chevron-down" class="w-3 h-3"></i>
    </button>

    <div x-show="aberto" @click.outside="aberto = false" x-transition.opacity
         class="absolute right-0 top-full mt-1 w-64 bg-white rounded-lg shadow-lg border border-gray-100 z-40 overflow-hidden"
         style="display: none;">
        <div class="px-3 py-2 border-b border-gray-100 flex items-center justify-between">
            <p class="text-xs font-semibold text-gray-600">Filtros salvos</p>
            <button @click="salvarAtual()" class="text-[10px] font-semibold text-fnp-600 hover:text-fnp-700">+ Salvar atual</button>
        </div>
        <div class="max-h-60 overflow-y-auto">
            <template x-if="filtros.length === 0">
                <p class="px-3 py-4 text-xs text-gray-400 text-center">Nenhum filtro salvo ainda.</p>
            </template>
            <template x-for="f in filtros" :key="f.id">
                <div class="flex items-center group hover:bg-gray-50">
                    <a :href="`?${f.parametros}`" class="flex-1 px-3 py-2 text-xs text-gray-700 truncate">
                        <span class="font-medium" x-text="f.nome"></span>
                        <span class="block text-gray-400 truncate" x-text="f.parametros || '(sem filtros)'"></span>
                    </a>
                    <button @click="remover(f)" class="opacity-0 group-hover:opacity-100 px-2 text-gray-400 hover:text-red-500 transition-opacity">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            </template>
        </div>
    </div>
</div>

<script>
// Componente compartilhado — escopo e endpoints sao parametros para reuso entre listas.
window.filtrosSalvos = function(escopo) {
    return {
        aberto: false,
        filtros: [],
        escopo: escopo,
        async carregar() {
            try {
                const r = await fetch(`{% url 'nucleo:filtros_salvos_listar' %}?escopo=${encodeURIComponent(this.escopo)}`);
                const d = await r.json();
                this.filtros = d.filtros || [];
            } catch (e) { this.filtros = []; }
        },
        async salvarAtual() {
            const nome = prompt('Nome para esta visão (ex.: "Capitais NE inadimplentes"):');
            if (!nome || !nome.trim()) return;
            const params = window.location.search.replace(/^\?/, '');
            const fd = new FormData();
            fd.append('escopo', this.escopo);
            fd.append('nome', nome.trim());
            fd.append('parametros', params);
            const csrftoken = window.csrftoken ? window.csrftoken() : '';
            const r = await fetch(`{% url 'nucleo:filtros_salvos_criar' %}`, {
                method: 'POST', body: fd, headers: {'X-CSRFToken': csrftoken},
            });
            if (r.ok) {
                if (window.toast) window.toast('success', `Visão "${nome}" salva`);
                this.carregar();
            } else {
                if (window.toast) window.toast('error', 'Falha ao salvar visão');
            }
        },
        async remover(f) {
            if (!confirm(`Remover a visão "${f.nome}"?`)) return;
            const csrftoken = window.csrftoken ? window.csrftoken() : '';
            await fetch(`/api/filtros-salvos/${f.id}/remover/`, {
                method: 'POST', headers: {'X-CSRFToken': csrftoken},
            });
            this.carregar();
        },
    };
};
</script>
