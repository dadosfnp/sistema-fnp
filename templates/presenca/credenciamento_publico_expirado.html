<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="UTF-8"><title>Link expirado</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script></head>
<body class="min-h-screen bg-amber-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 text-center">
        <div class="w-20 h-20 mx-auto rounded-full bg-amber-100 flex items-center justify-center">
            <i data-lucide="alert-triangle" class="w-10 h-10 text-amber-600"></i>
        </div>
        <h1 class="text-xl font-bold text-gray-900 mt-4">Link expirado</h1>
        <p class="text-sm text-gray-600 mt-3">Este pré-credenciamento não está mais disponível. Entre em contato com a recepção da FNP para receber um novo link.</p>
    </div>
    <script>lucide.createIcons();</script>
</body></html>
